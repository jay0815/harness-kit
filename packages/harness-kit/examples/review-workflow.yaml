workflow: code-review
description: 对 harness-kit 代码库进行质量检查和 review

phases:
  # Phase 1: 运行 lint 检查
  - name: lint
    executor: code
    command: "pnpm run lint"

  # Phase 2: 运行类型检查
  - name: typecheck
    executor: code
    command: "pnpm run typecheck"

  # Phase 3: 运行测试
  - name: test
    executor: code
    command: "pnpm run test"

  # Phase 4: 统计代码行数
  - name: stats
    executor: code
    command: |
      echo "=== 源文件统计 ==="
      find packages/harness-kit/src -name "*.ts" ! -name "*.test.ts" 2>/dev/null | wc -l | xargs echo "源文件数量:"
      find packages/harness-kit/src -name "*.ts" ! -name "*.test.ts" -exec cat {} + 2>/dev/null | wc -l | xargs echo "源代码行数:"
      echo ""
      echo "=== 测试文件统计 ==="
      find packages/harness-kit/src -name "*.test.ts" 2>/dev/null | wc -l | xargs echo "测试文件数量:"
      find packages/harness-kit/src -name "*.test.ts" -exec cat {} + 2>/dev/null | wc -l | xargs echo "测试代码行数:"
      echo ""
      echo "=== 模块列表 ==="
      find packages/harness-kit/src -name "*.ts" ! -name "*.test.ts" 2>/dev/null | sort

  # Phase 5: LLM 综合 review
  - name: review
    executor: llm
    prompt: |
      ## 代码 Review 任务

      请基于 harness-kit 的代码架构进行深度 review。

      ### 背景
      harness-kit 是一个 PI Extension，用于编排 coding agent 执行结构化 workflow，并对输出进行硬验证。

      ### 核心模块
      - `index.ts` — Extension 入口，事件处理（session_start, turn_end, before_agent_start）
      - `workflow.ts` / `workflow-schema.ts` — Workflow 定义与 schema
      - `workflow-loader.ts` / `workflow-executor.ts` — Workflow 加载与执行
      - `code-executor.ts` — 代码执行器（shell + script）
      - `verify.ts` — Fact 验证（精确文本匹配）
      - `guardrails.ts` — 越权写入检测（workspace 快照）
      - `state.ts` — 状态持久化（artifact-driven）
      - `tools.ts` — PI tools 定义
      - `telemetry.ts` — 可观测性

      ### Review 维度（按优先级）

      1. **架构合理性**
         - 模块职责是否清晰？
         - 依赖关系是否合理？
         - 是否有循环依赖？

      2. **错误处理**
         - 边界情况是否处理？
         - 失败路径是否明确？
         - 是否有静默失败？

      3. **类型安全**
         - 是否充分利用 TypeScript 类型系统？
         - 是否有 unsafe 的类型断言？
         - 运行时验证是否充分？

      4. **可维护性**
         - 代码是否易于理解？
         - 是否有一致的风格？
         - 是否有过度工程或不足？

      5. **安全与鲁棒性**
         - 输入验证是否充分？
         - 是否有潜在的注入风险？
         - 资源泄漏？

      ### 输出格式

      请按以下格式输出 review 结果：

      ```
      ## 架构评估
      [整体架构评价]

      ## 发现的问题
      1. [严重程度: 高/中/低] [问题描述]
         - 文件: [path]
         - 影响: [影响范围]
         - 建议: [修复建议]

      ## 优点
      - [代码做得好的地方]

      ## 改进建议
      - [优先级高的改进点]
      ```
